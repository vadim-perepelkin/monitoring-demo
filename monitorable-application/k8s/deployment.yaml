apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitorable-application-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: monitorable-application
  template:
    metadata:
      labels:
        app: monitorable-application
    spec:
      containers:
        - name: monitorable-application
          image: docker.io/library/monitorable-application:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: fail-rate
              value: "0.03"
            - name: delay-mean
              value: "300"
            - name: delay-deviation
              value: "100"
